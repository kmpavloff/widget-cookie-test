events {
  worker_connections 1024;
}

http {
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  # --- HTTPS for all domains ---
  server {
    listen 443 ssl;
    server_name example.localhost;
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    location / {
      proxy_pass http://example-app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cookie_path / /;
    }
  }

  server {
    listen 443 ssl;
    server_name site-a.localhost;
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    location / {
      proxy_pass http://site-a:3000;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 443 ssl;
    server_name site-b.localhost;
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    location / {
      proxy_pass http://site-b:3000;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 443 ssl;
    server_name dashboard.localhost;
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    location / {
      proxy_pass http://dashboard:3000;
      proxy_set_header Host $host;
    }
  }

  # --- HTTP → HTTPS redirect ---
  server {
    listen 80;
    server_name example.localhost site-a.localhost site-b.localhost dashboard.localhost;
    return 301 https://$host$request_uri;
  }
}
